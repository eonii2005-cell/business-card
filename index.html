<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이성언 - 비엠스마일</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Google Sans', 'Noto Sans KR', Roboto, Arial, sans-serif;
    padding: 24px;
    position: relative;
    overflow: hidden;
    background: #eef2f7;
  }

  .bg-blobs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
  }

  .blob-1 {
    width: 460px; height: 460px;
    background: #c9d6ff;
    top: -120px; left: -120px;
  }
  .blob-2 {
    width: 420px; height: 420px;
    background: #fbc2eb;
    bottom: -100px; right: -100px;
  }
  .blob-3 {
    width: 360px; height: 360px;
    background: #a1c4fd;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.35;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 420px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow:
      0 8px 32px 0 rgba(31, 38, 135, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.8);
    overflow: hidden;
  }

  .header {
    padding: 28px 32px 24px 32px;
    position: relative;
    border-bottom: 1px solid rgba(255, 255, 255, 0.5);
  }

  .logo {
    margin-bottom: 22px;
  }

  .logo img {
    height: 36px;
    width: auto;
    display: block;
    opacity: 0.85;
  }

  .profile {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .avatar-wrap {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4));
    box-shadow:
      0 4px 16px rgba(31, 38, 135, 0.15),
      inset 0 0 0 1px rgba(255, 255, 255, 0.7);
    flex-shrink: 0;
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .profile-text { flex: 1; min-width: 0; }

  .name {
    font-size: 28px;
    font-weight: 500;
    color: #1a1f2e;
    margin-bottom: 6px;
    letter-spacing: -0.4px;
  }

  .role {
    font-size: 14px;
    color: #5a6478;
    font-weight: 400;
  }

  .role .dot {
    margin: 0 8px;
    color: rgba(90, 100, 120, 0.4);
  }

  .body {
    padding: 18px 24px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .info-row {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 14px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: background 0.2s ease;
  }

  .info-row:hover {
    background: rgba(255, 255, 255, 0.7);
  }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 14px;
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  }

  .icon svg { width: 18px; height: 18px; }

  .info-text {
    flex: 1;
    min-width: 0;
  }

  .info-label {
    font-size: 10.5px;
    color: #7a8499;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 2px;
    font-weight: 500;
  }

  .info-value {
    font-size: 15px;
    color: #1a1f2e;
    font-weight: 400;
    word-break: break-all;
  }

  .info-value a {
    color: #1a1f2e;
    text-decoration: none;
  }

  .info-value a:hover { color: #4a5cf0; }

  .footer {
    padding: 14px 24px 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #7a8499;
    border-top: 1px solid rgba(255, 255, 255, 0.5);
  }

  .badge {
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.8);
    color: #5a6478;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">
    <div class="header">
      <div class="logo">
        <img src="images.png" alt="BM Smile">
      </div>
      <div class="profile">
        <div class="avatar-wrap">
          <img class="avatar" src="고화질 복사본.JPG" alt="이성언 프로필">
        </div>
        <div class="profile-text">
          <div class="name">이성언</div>
          <div class="role">대리<span class="dot">·</span>비엠스마일</div>
        </div>
      </div>
    </div>

    <div class="body">
      <div class="info-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="#5a6478" stroke-width="1.8"/>
            <path d="M22 6l-10 7L2 6" stroke="#5a6478" stroke-width="1.8"/>
          </svg>
        </div>
        <div class="info-text">
          <div class="info-label">Email</div>
          <div class="info-value"><a href="mailto:****@mail.com">****@mail.com</a></div>
        </div>
      </div>

      <div class="info-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z" stroke="#5a6478" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="info-text">
          <div class="info-label">Phone</div>
          <div class="info-value"><a href="tel:010****5223">010-****-5223</a></div>
        </div>
      </div>

      <div class="info-row">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h.01M9 13h.01M9 17h.01M15 9h.01M15 13h.01M15 17h.01" stroke="#5a6478" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="info-text">
          <div class="info-label">Company</div>
          <div class="info-value">비엠스마일</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>BMSmile · 대리</span>
      <span class="badge">Business Card</span>
    </div>
  </div>
</body>
</html>
